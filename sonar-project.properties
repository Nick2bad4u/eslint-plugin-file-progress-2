# ===============================================================================
# SonarCloud Configuration for eslint-plugin-file-progress-2
# ===============================================================================

# Project identification
sonar.organization=nick2bad4u
sonar.projectKey=Nick2bad4u_eslint-plugin-file-progress-2
sonar.projectName=eslint-plugin-file-progress-2

# SonarCloud server configuration
sonar.host.url=https://sonarcloud.io

# ===============================================================================
# SOURCE CONFIGURATION
# ===============================================================================

# Main source directories (production code only)
sonar.sources=src

# Exclude repository tooling, docs, workflows, generated outputs, and tests so
# SonarCloud stays focused on shipped plugin runtime code only.
sonar.exclusions=.github/**,**/.github/**,**/benchmark/**,**/benchmarks/**,docs/**,**/docs/**,scripts/**,**/scripts/**,test/**,tests/**,**/test/**,**/tests/**,**/node_modules/**,dist/**,**/dist/**,coverage/**,**/coverage/**,build/**,**/build/**,temp/**,**/temp/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.mjs,commitlint.config.mjs,stryker.config.mjs,stylelint.config.mjs


# Exclude non-production code from duplication analysis.
sonar.cpd.exclusions=test/**,tests/**,**/test/**,**/tests/**,benchmark/**,benchmarks/**,**/benchmark/**,**/benchmarks/**,scripts/**,**/scripts/**,docs/**,**/docs/**,.github/**,**/.github/**

# ===============================================================================
# LANGUAGE AND FILE TYPE CONFIGURATION
# ===============================================================================

sonar.typescript.file.suffixes=.ts,.tsx,.mts,.cts
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs

# Restrict Sonar's TypeScript program discovery to the root configs that define
# the plugin source/test/tooling surface. This avoids stale docs-workspace
# tsconfig warnings and keeps analysis focused on repo-local configs.
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.build.json,tsconfig.eslint.json,tsconfig.js.json,tsconfig.vitest-typecheck.json

# ===============================================================================
# CODE COVERAGE CONFIGURATION
# ===============================================================================

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ensure no coverage expectations on test files or non-prod folders.
# Bare forms (test/**, scripts/**, docs/**) are included alongside the **/…/**
# forms for the same Ant-style pattern reason noted on sonar.cpd.exclusions.
sonar.coverage.exclusions=test/**,**/test/**,benchmark/**,benchmarks/**,**/benchmark/**,**/benchmarks/**,scripts/**,**/scripts/**,docs/**,**/docs/**,**/.github/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.mjs

# ===============================================================================
# CODE ANALYSIS CONFIGURATION
# ===============================================================================

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Treat bundle logic as test/generated logic for scripts if needed
sonar.javascript.detectBundles=true

# Wait for Quality Gate
sonar.qualitygate.wait=true
