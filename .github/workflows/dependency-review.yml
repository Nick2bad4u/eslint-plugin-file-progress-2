# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
# This GitHub Actions workflow is named 'Dependency Review'.
# It is triggered by pull requests and merge queue checks.
#
# Permissions:
# - The workflow has read access to the repository contents.
#
# Jobs:
# - dependency-review:
#   - Runs on the latest Ubuntu runner.
#   - Steps:
#     1. Harden Runner:
#        - Uses the 'step-security/harden-runner' action (version v2.15.1).
#        - Configured with an egress policy set to audit.
#     2. Checkout Repository:
#        - Uses the 'actions/checkout' action (version v6.0.2) to check out the repository.
#     3. Dependency Review:
#        - Uses the 'actions/dependency-review-action' (version v4.9.0) to perform a dependency review.

# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Dependency Review"
run-name: Dependency Review • ${{ github.ref_name }} @${{ github.actor }}

on:
    pull_request:
    merge_group:
        types:
            - checks_requested

permissions:
    contents: read

concurrency:
    group: dependency-review-${{ github.ref }}
    cancel-in-progress: true

jobs:
    dependency-review:
        name: Dependency Review
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: "Checkout Repository"
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: "Dependency Review"
              uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
              with:
                  fail-on-severity: moderate
