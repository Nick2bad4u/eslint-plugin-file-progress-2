# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Truffle Hog Secret Scan
run-name: ${{ format('Trufflehog scan for {0}', github.ref_name) }}

on:
    push:
    pull_request:
        branches: ["master"]
        types: [opened, synchronize, reopened, ready_for_review]
    merge_group:
        types: [checks_requested]
    workflow_dispatch:
    schedule:
        - cron: "44 4 * * 0" # Runs every Sunday at midnight UTC; https://crontab.guru/#0_0_*_*_0

concurrency:
    group: trufflehog-${{ github.ref }}
    cancel-in-progress: true

jobs:
    trufflehog:
        name: Trufflehog scan
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
            - name: Secret Scanning (entire repo)
              uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10 # v3.94.1
              with:
                  base: ""
                  head: ${{ github.ref_name }}
                  # Only fail the job for VERIFIED secrets.
                  # Unverified/unknown results are often high-noise in OSS repos
                  # (example strings, docs, placeholder tokens) and already
                  # covered by other scanners (gitleaks, etc.).
                  extra_args: --results=verified --exclude-detectors=URI
